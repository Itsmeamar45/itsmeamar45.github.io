<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Website</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Poppins:wght@600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <h1>MySite</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <h2>Contact Me</h2>

        <!-- Updated Contact Form -->
        <form id="contact-form">
            <input type="text" name="user_name" placeholder="Your Name" required>
            <input type="email" name="user_email" placeholder="Your Email" required>
            <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>

    <!-- EmailJS Scripts -->
    <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
    <script>
        (function(){
            emailjs.init("70V9oVMl7AhrGZZ5S"); // Your Public Key
        })();

        const form = document.getElementById('contact-form');
        form.addEventListener('submit', function(event) {
            event.preventDefault();

            // Send message to yourself
            emailjs.sendForm('service_cvqurqh', 'template_k82ri5y', this)
                .then(() => {
                    // Send auto-reply to user
                    emailjs.sendForm('service_cvqurqh', 'template_wukhuxp', this)
                        .then(() => {
                            alert('Message sent and confirmation email sent!');
                            form.reset();
                        }, (err) => {
                            console.error('Auto-reply failed:', err);
                            alert('Message sent, but confirmation email failed.');
                        });
                }, (err) => {
                    console.error('Sending message failed:', err);
                    alert('Failed to send message. Please try again.');
                });
        });
    </script>

</body>
</html>
